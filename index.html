<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiro Kibon | Credenciamento 2026</title>
    <style>
        /* Estilos de Cores Kibon */
        :root {
            --vermelho-kibon: #e2001a;
            --azul-detalhe: #004a99;
            --branco: #ffffff;
            --cinza-fundo: #f8f9fa;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--cinza-fundo);
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: var(--vermelho-kibon);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header img {
            max-width: 150px; /* Logo da Kibon */
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background: var(--branco);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: var(--vermelho-kibon);
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* Seção de Download */
        .apk-section {
            background: linear-gradient(135deg, #fff5f5 0%, #ffebeb 100%);
            border: 2px solid #ffccd1;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 40px;
        }

        .btn-download {
            display: inline-block;
            background-color: var(--vermelho-kibon);
            color: white;
            padding: 18px 35px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(226, 0, 26, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            background-color: #b30015;
        }

        /* Estilo do Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row > div {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background-color: #218838;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>

<header>
    <!-- Logo Oficial da Kibon via URL -->
    <img src="https://upload.wikimedia.org/wikipedia/pt/thumb/d/d1/Logotipo_da_Kibon.svg/1200px-Logotipo_da_Kibon.svg.png" alt="Kibon Logo">
</header>

<div class="container">
    
    <div class="apk-section">
        <h3>🚀 Área de Download</h3>
        <p>Baixe o APK oficial para gerenciar suas vendas e pedidos.</p>
        <a href="seu-arquivo.apk" class="btn-download">INSTALAR APLICATIVO (.APK)</a>
    </div>

    <h2>Cadastro de Parceiro</h2>
    
    <form action="#" method="POST">
        <!-- Nome e E-mail -->
        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" name="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="exemplo@email.com" required>
        </div>

        <!-- Renda e Telefone -->
        <div class="row">
            <div class="form-group">
                <label>Renda Mensal Estimada</label>
                <select name="renda" required>
                    <option value="">Selecione...</option>
                    <option value="1">Até R$ 2.000</option>
                    <option value="2">R$ 2.000 a R$ 5.000</option>
                    <option value="3">R$ 5.000 a R$ 10.000</option>
                    <option value="4">Acima de R$ 10.000</option>
                </select>
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" name="whatsapp" placeholder="(00) 00000-0000" required>
            </div>
        </div>

        <!-- Localização: Cidade e Estado -->
        <div class="row">
            <div class="form-group">
                <label>Estado (UF)</label>
                <input type="text" name="estado" placeholder="Ex: SP" maxlength="2" required>
            </div>
            <div class="form-group">
                <label>Cidade</label>
                <input type="text" name="cidade" placeholder="Sua cidade" required>
            </div>
        </div>

        <div class="form-group">
            <label>Endereço / Local da Venda</label>
            <input type="text" name="local" placeholder="Rua, número e bairro" required>
        </div>

        <label style="font-weight: normal; font-size: 13px; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" style="width: auto;" required> Declaro que li e aceito os termos de parceria.
        </label>

        <button type="submit" class="btn-submit">ENVIAR CADASTRO AGORA</button>
    </form>
</div>

<footer>
    © 2026 Kibon Brasil - Programa de Parceria Independente.<br>
    Este é um portal de apoio ao parceiro.
</footer>

</body>
</html>
